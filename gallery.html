<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background-color:#cbe8f6;
    }

    /* Navigation Bar */
    nav{
        background-color:#003366;
        padding:15px;
        text-align:center;
    }

    nav a{
        color:white;
        text-decoration:none;
        padding:14px 20px;
        font-size:18px;
        font-weight:bold;
    }

    nav a:hover{
        background-color:#0055aa;
        border-radius:5px;
    }

    h1{
        text-align:center;
        color:#003366;
        margin:30px 0;
        font-size:40px;
    }

    h2{
        text-align:center;
        color:#003366;
        margin:30px 0 20px;
    }

    /* Gallery Layout */
    .gallery{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:25px;
        margin-bottom:40px;
    }

    figure{
        background:rgb(255, 255, 255);
        width:300px;
        padding:15px;
        border-radius:12px;
        box-shadow:0 4px 10px rgba(0, 0, 0, 0.2);
        text-align:center;
        transition:0.3s;
    }

    figure:hover{
        transform:translateY(-8px);
    }

    figure img{
        width:100%;
        height:220px;
        object-fit:cover;
        border-radius:10px;
    }

    figcaption{
        margin-top:12px;
        color:#0a0000;
        font-size:15px;
    }

    hr{
        border:1px solid #0c375b;
        margin:20px;
    }
</style>
</head>

<body>

<nav>
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
</nav>
